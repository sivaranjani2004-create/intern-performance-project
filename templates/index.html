<!DOCTYPE html>
<html>
<head>
    <title>Intern Performance Predictor</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #9face6);
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 25px;
            margin: 50px auto;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px gray;
        }

        input {
            margin: 6px;
            padding: 10px;
            width: 90%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        button:hover {
            background: #45a049;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Intern Performance Prediction</h1>

<div class="container">

    <input type="number" id="f1" placeholder="Tasks Assigned">
    <input type="number" id="f2" placeholder="Tasks Completed">
    <input type="number" id="f3" placeholder="Avg Task Time">
    <input type="number" id="f4" placeholder="Attendance %">
    <input type="number" id="f5" placeholder="Consistency Score">
    <input type="number" id="f6" placeholder="Engagement Score">
    <input type="number" id="f7" placeholder="Feedback Score">
    <input type="number" id="f8" placeholder="Learning Progress">
    <input type="number" id="f9" placeholder="Deadline Misses">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>

</div>

<script>
function predict() {

    let data = [
        parseFloat(document.getElementById("f1").value),
        parseFloat(document.getElementById("f2").value),
        parseFloat(document.getElementById("f3").value),
        parseFloat(document.getElementById("f4").value),
        parseFloat(document.getElementById("f5").value),
        parseFloat(document.getElementById("f6").value),
        parseFloat(document.getElementById("f7").value),
        parseFloat(document.getElementById("f8").value),
        parseFloat(document.getElementById("f9").value)
    ];

    let resultBox = document.getElementById("result");
    resultBox.innerText = "Predicting...";

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ features: data })
    })
    .then(response => response.json())
    .then(result => {

        let output = result.prediction;
        resultBox.innerText = "Prediction: " + output;

        // 🎨 Color logic
        if (output === "High") {
            resultBox.style.color = "green";
        } 
        else if (output === "Medium") {
            resultBox.style.color = "orange";
        } 
        else {
            resultBox.style.color = "red";
        }

    })
    .catch(error => {
        resultBox.innerText = "Error connecting to API";
        resultBox.style.color = "red";
    });
}
</script>

</body>
</html>
